<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotiDrop - Premium Spotify Track Downloader</title>
  <meta name="description" content="Download high-quality Spotify tracks instantly using SpotiDrop. The most modern, sleek, and high-fidelity client-side Spotify downloader.">
  <link rel="stylesheet" href="style.css?v=2.1">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Decorative Background Elements -->
  <div class="bg-mesh">
    <div class="mesh-node-1"></div>
    <div class="mesh-node-2"></div>
    <div class="mesh-node-3"></div>
  </div>

  <!-- Premium Header -->
  <header>
    <div class="logo-group">
      <div class="brand-icon">
        <i data-lucide="music-4" style="color: #fff; width: 22px; height: 22px;"></i>
      </div>
      <div class="brand-name">SpotiDrop</div>
    </div>
  </header>

  <!-- Dashboard Main Grid -->
  <main>
    <!-- Left Engine Column -->
    <div class="hero-content">
      <h1 class="title-glow">Drop your link.<br>Get your <span>Music.</span></h1>
      <p class="subtitle-muted">
        SpotiDrop allows you to retrieve and download high-quality Spotify songs instantly using clean client-side APIs. Simply paste the song URL below.
      </p>
      <br>

      <!-- Glassmorphic Drop Card -->
      <div class="premium-card">
        <div class="input-container">
          <label class="label-lux" for="spotifyUrl">Spotify Track URL</label>
          <div class="input-field-wrapper">
            <i data-lucide="link-2" class="icon-inside" style="width: 22px; height: 22px;"></i>
            <input 
              type="text" 
              id="spotifyUrl" 
              class="input-lux" 
              placeholder="https://open.spotify.com/track/..."
              autocomplete="off"
            >
          </div>
        </div>

        <button class="btn-drop-lux" id="dropBtn">
          <i data-lucide="sparkles" id="btnIcon" style="width: 20px; height: 20px;"></i>
          <span id="btnText">Drop Track</span>
          <span class="spinner" id="btnSpinner"></span>
        </button>

        <!-- Skeleton Loading Presentation -->
        <div class="result-card-container" id="skeletonLoader">
          <div class="result-card-premium">
            <div class="shimmer-bg shimmer-art"></div>
            <div class="track-info-lux" style="gap: 0.65rem;">
              <div class="shimmer-bg shimmer-line shimmer-title"></div>
              <div class="shimmer-bg shimmer-line shimmer-artist"></div>
            </div>
          </div>
        </div>

        <!-- Dynamic Success Track Card -->
        <div class="result-card-container" id="trackResult">
          <div class="result-card-premium" id="trackCard">
            <div class="cover-wrapper-lux">
              <img id="albumArt" class="cover-img-lux" src="" alt="Cover Art">
              <div class="disc-vinyl-overlay">
                <i data-lucide="disc" style="color: #fff; width: 36px; height: 36px;"></i>
              </div>
            </div>
            <div class="track-info-lux">
              <h3 class="track-name-lux" id="trackTitle">Track Title</h3>
              <p class="track-artist-lux" id="trackArtist">Artist Name</p>
              <span class="track-tag-lux" id="trackMeta">Duration: --:--</span>
            </div>
            
            <!-- Real-time Circular progress Action panel -->
            <div class="download-action-group">
              <button id="downloadBtn" class="btn-download-premium">
                <i data-lucide="download" style="width: 18px; height: 18px;"></i>
                <span>Download MP3</span>
              </button>
              
              <!-- Premium circular loader SVG -->
              <div class="progress-ring-container" id="circleProgressContainer">
                <svg class="progress-ring" width="44" height="44">
                  <circle
                    class="progress-ring__circle"
                    stroke="#1db954"
                    stroke-width="3"
                    fill="transparent"
                    r="18"
                    cx="22"
                    cy="22"/>
                </svg>
                <span class="progress-percent-label" id="circleProgressPercent">0%</span>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Right Sidebar Library & Active Queues Column -->
    <div class="dashboard-side-layout">
      <!-- Active downloading queue panel (visible only when download is happening) -->
      <div class="side-card" id="queueCard" style="display: none;">
        <div class="queue-title">
          <i data-lucide="radio" style="color: var(--spotify-green); width: 18px; height: 18px;"></i>
          <span>Active Downloads</span>
        </div>
        <div class="queue-container" id="queueContainer" style="display: flex;">
          <!-- Queue Item Template injected by JavaScript -->
        </div>
      </div>

      <!-- General Downloaded Library Panel -->
      <div class="side-card">
        <h2 class="side-card-title">
          <i data-lucide="library" style="color: var(--primary-glow); width: 22px; height: 22px;"></i>
          <span>Downloaded Tracks</span>
        </h2>
        
        <div class="library-scroller" id="libraryScroller">
          <!-- Empty State -->
          <div class="empty-history" id="emptyHistory">
            <i data-lucide="music" style="width: 36px; height: 36px; stroke-width: 1.5; opacity: 0.5;"></i>
            <span>No downloaded songs yet</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Hardcoded API Mode Active -->

  <!-- Toast notifications box -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main JavaScript File -->
  <script src="app.js?v=2.1"></script>
</body>
</html>
